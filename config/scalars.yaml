# Mu2e Trigger Scalers configuration
#
# Transport: choose "udp" or "zeromq"
# Each TriggerMessage carries a category index (0-based) and a cumulative count.
# Category IDs here must match what the DAQ broadcast sends.

display:
  size: small                   # small | medium | large | huge
  update_interval_ms: 1000      # Rate refresh period
  window_title: "Mu2e Trigger Scalers"
  columns: 4                    # Scalar widgets per row within each bank

transport:
  protocol: zeromq              # udp | zeromq

  udp:
    bind_address: "0.0.0.0"    # Bind to all interfaces (receives broadcasts)
    port: 5555

  zeromq:
    endpoint: "tcp://localhost:5556"
    socket_type: sub            # sub (PUB/SUB broadcast) | pull (PUSH/PULL pipeline)

banks:
  - name: "Beam & Timing Triggers"
    triggers:
      - id: 0
        name: "Mu2e Spill"
        target_rate: 0.6
        visible: true
        alarm:
          enabled: true
          min_rate: 0.1
          max_rate: 2.0

      - id: 1
        name: "Booster Spill"
        target_rate: 15.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 2
        name: "Cosmics Pulser"
        target_rate: 10.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 3
        name: "Pulser (Rand)"
        target_rate: 10.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 4
        name: "Manual"
        target_rate: -1.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 5
        name: "Accelerator Ext"
        target_rate: 1.0
        visible: true
        alarm:
          enabled: true
          min_rate: 0.5
          max_rate: 2.0

  - name: "Data-Driven Triggers"
    triggers:
      - id: 6
        name: "Helix: Base"
        target_rate: -1.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 7
        name: "Helix: Tight"
        target_rate: -1.0
        visible: true
