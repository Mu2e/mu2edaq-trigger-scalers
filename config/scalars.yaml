          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 8
        name: "Helix: Prescale"
        target_rate: -1.0
        visible: true
        alarm:
          enabled: false
          min_rate: -1.0
          max_rate: -1.0

      - id: 9
        name: "Activity: Base"
        target_rate: -1.0
        visible: true
